name: Databricks CLI via Key Vault

on:
  push:
    branches:
      - master
      - main
  pull_request:
    branches:
      - master
      - main


permissions:
  id-token: write
  contents: read

jobs:
  databricks-cli:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Azure Login using OIDC
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
         
      # Fetch Databricks secrets from Key Vault
      - name: Get Databricks Secrets
        id: get-secrets
        uses: azure/cli@v2
        with:
          azcliversion: latest
          inlineScript: |
            KEY_VAULT_NAME="IN-MUM-JOG-102"

            # Secret names in Key Vault
            DATABRICKS_HOST_SECRET="adb-dev-url"
            DATABRICKS_TOKEN_SECRET="adb-dev-token-admin"

            # Fetch secrets
            DATABRICKS_HOST=$(az keyvault secret show \
              --name $DATABRICKS_HOST_SECRET \
              --vault-name $KEY_VAULT_NAME \
              --query value -o tsv)

            DATABRICKS_TOKEN=$(az keyvault secret show \
              --name $DATABRICKS_TOKEN_SECRET \
              --vault-name $KEY_VAULT_NAME \
              --query value -o tsv)

            # Export as environment variables
            echo "DATABRICKS_HOST=$DATABRICKS_HOST" >> $GITHUB_ENV
            echo "DATABRICKS_TOKEN=$DATABRICKS_TOKEN" >> $GITHUB_ENV

      # Install Databricks CLI
      - name: Setup Databricks CLI
        uses: databricks/setup-cli@main
        
      # Run Databricks command
      - name: Run Databricks Workspace List
        run: |
          databricks workspace list /
      # Run Databricks command
      - name: Run Databricks Workspace List
        run: |
          databricks workspace list /
